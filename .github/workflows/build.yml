name: Build ZeroCopy

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NDK_VERSION: 27.0.12077973
  CMAKE_VERSION: 3.22.1
  ANDROID_API: 36

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Install Android SDK components
        id: install-sdk
        run: |
          ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            echo "cmdline-tools not found, installing..."
            mkdir -p $HOME/android-sdk
            cd $HOME/android-sdk
            curl -sSLo cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
            unzip -q cmdline-tools.zip
            mkdir -p cmdline-tools/latest
            for item in cmdline-tools/*; do
              [ "$item" = "cmdline-tools/latest" ] && continue
              mv "$item" cmdline-tools/latest/ 2>/dev/null || true
            done
            ANDROID_HOME=$HOME/android-sdk
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
            echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
            echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          fi
          yes | $SDKMANAGER --licenses > /dev/null 2>&1 || true
          TMPLOG=$(mktemp)
          set +e
          $SDKMANAGER --install \
            "platforms;android-${{ env.ANDROID_API }}" \
            "build-tools;${{ env.ANDROID_API }}.0.0" \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}" \
            "platform-tools" \
            > "$TMPLOG" 2>&1
          tail -20 "$TMPLOG"
          rm -f "$TMPLOG"
          set -e
          NDK_HOME="$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}"
          echo "NDK_HOME=$NDK_HOME" >> $GITHUB_ENV
          echo "ndk-path=$NDK_HOME" >> $GITHUB_OUTPUT

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache CMake builds
        uses: actions/cache@v4
        with:
          path: |
            app/build/intermediates/cxx/
            app/.cxx/
          key: ${{ runner.os }}-cmake-${{ hashFiles('app/src/main/cpp/**', 'app/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroCopy-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
