name: Build ZeroCopy APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27.0.12077973
        run: |
          sdkmanager --install "ndk;27.0.12077973"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Generate Cargo.lock
        working-directory: rust_core
        run: cargo generate-lockfile

      - name: Cache cargo-ndk
        id: cache-cargo-ndk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: cargo-ndk-4.1.2

      - name: Install cargo-ndk
        if: steps.cache-cargo-ndk.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            rust_core/target
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-${{ hashFiles('rust_core/Cargo.lock') }}

      - name: Build Rust core + Android APK
        run: ./build_all.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Rust shared library (optional debug)
        uses: actions/upload-artifact@v4
        with:
          name: libzerocopy_core
          path: app/src/main/jniLibs/arm64-v8a/libzerocopy_core.so
