name: Build ZeroCopy

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      enable_rust:
        description: 'Build Rust optimization layer'
        required: false
        default: false
        type: boolean
      enable_vulkan:
        description: 'Enable Vulkan GPU backend'
        required: false
        default: false
        type: boolean

env:
  NDK_VERSION: 29.0.14206865
  CMAKE_VERSION: 3.22.1
  ANDROID_API: 36
  GRADLE_VERSION: 8.12.1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Install Android SDK components
        run: |
          ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          if [ -z "$ANDROID_HOME" ]; then
            echo "Android SDK not found, installing..."
            mkdir -p $HOME/android-sdk
            cd $HOME/android-sdk
            curl -o cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q cmdline-tools.zip
            mkdir -p cmdline-tools/latest
            mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
            ANDROID_HOME=$HOME/android-sdk
            echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
            echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          fi

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-${{ env.ANDROID_API }}" \
            "build-tools;${{ env.ANDROID_API }}.0.0" \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}" \
            "platform-tools" \
            2>&1 | tail -20

          echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache CMake builds
        uses: actions/cache@v4
        with:
          path: |
            app/build/intermediates/cxx/
            app/.cxx/
          key: ${{ runner.os }}-cmake-${{ hashFiles('app/src/main/cpp/**', 'app/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Build Rust core
        if: ${{ github.event.inputs.enable_rust == 'true' }}
        run: |
          export ANDROID_NDK_HOME="${{ env.NDK_HOME }}"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-linux-android
          cargo install cargo-ndk
          cd rust_core
          export ANDROID_NDK_HOME="${{ env.NDK_HOME }}"
          cargo ndk -t arm64-v8a -o ../app/src/main/jniLibs build --release
          cd ..

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroCopy-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
